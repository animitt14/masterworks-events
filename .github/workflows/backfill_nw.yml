name: Backfill NW (one-off)

on:
  workflow_dispatch:
    inputs:
      cutoff_date:
        description: 'Process contacts with RSVP ≤ this date (YYYY-MM-DD)'
        required: false
        default: '2026-06-01'

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        env:
          HUBSPOT_API_KEY:    ${{ secrets.HUBSPOT_API_KEY }}
          WHITEPAGES_API_KEY: ${{ secrets.WHITEPAGES_API_KEY }}
          CENSUS_API_KEY:     ${{ secrets.CENSUS_API_KEY }}
          GOOGLE_API_KEY:     ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID:      ${{ secrets.GOOGLE_CSE_ID }}
          ROCKETREACH_API_KEY: ${{ secrets.ROCKETREACH_API_KEY }}
          GITHUB_REPO:        ${{ github.repository }}
        run: python backfill_nw.py ${{ github.event.inputs.cutoff_date }}

      - name: Commit updated cache
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add enrich_cache.json company_scale_cache.json || true
          git diff --staged --quiet && echo "No cache changes" || \
            git commit -m 'chore: update enrich cache from NW backfill [skip ci]' && \
            git pull --rebase -X theirs && git push
